<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 💝 Preview ตอนส่งลิงก์ -->
<meta property="og:title" content="ตั้งใจทำของขวัญมาให้นะครับบ 🎁">
<meta property="og:description" content="ลองกดดูหน่อยนะ ☺️">
<meta property="og:image" content="https://i.imgur.com/9Xn4K8G.png">

<title>For You 💖</title>

<!-- ฟ้อนต์น่ารัก -->
<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Mali', cursive;
  background: #F5B5CD;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

.container {
  cursor: pointer;
}

.gift {
  font-size: 100px;
  transition: 0.3s;
}

.text {
  margin-top: 20px;
  font-size: 20px;
  color: #5a3d45;
}

.video-box {
  display: none;
}

/* ✨ Animation สั่น */
.shake {
  animation: shake 0.4s;
}

@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  50% { transform: translateX(8px); }
  75% { transform: translateX(-8px); }
  100% { transform: translateX(0); }
}

/* ✨ ซูม + จาง */
.open {
  animation: openAnim 0.8s forwards;
}

@keyframes openAnim {
  0% { transform: scale(1); opacity: 1; }
  100% { transform: scale(2); opacity: 0; }
}
</style>
</head>

<body>

<div class="container" id="box" onclick="handleClick()">
  <div class="gift">🎁</div>
  <div class="text" id="msg">ลองกดเปิดดูนะครับ ☺️</div>
</div>

<div class="video-box" id="videoBox">
  <div class="text">ลองฟังดูนะครับ 💕</div>
  <video width="300" autoplay muted playsinline controls>
    <source src="Https://drive.google.com/uc?export=download&id=16anjszLH3r9CDeXfzLyNex55zYBQJynO" type="video/mp4">
  </video>
</div>

<script>
let count = 0;

function handleClick() {
  const box = document.getElementById("box");

  count++;

  if (count === 1 || count === 2) {
    box.classList.add("shake");

    setTimeout(() => {
      box.classList.remove("shake");
    }, 400);
  }

  if (count === 3) {
    box.classList.add("open");

    setTimeout(() => {
      box.style.display = "none";
      document.getElementById("videoBox").style.display = "block";
    }, 800);
  }
}
</script>

</body>
</html>
