<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    font-family: 'Mali', cursive;
    background: #FFDEE9; /* ปรับสีชมพูให้สว่างและนวลขึ้น */
    background-image: linear-gradient(0deg, #FFDEE9 0%, #B5FFFC 100%); /* เพิ่มไล่เฉดสีให้ดูละมุน */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }
  .container { cursor: pointer; text-align: center; }
  .gift { font-size: 100px; transition: 0.3s; }
  .text { margin-top: 20px; font-size: 22px; color: #d63384; font-weight: bold; }
  .video-box { display: none; text-align: center; width: 90%; max-width: 400px; }
  video { width: 100%; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }

  /* Animation */
  .shake { animation: shake 0.4s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-10px) rotate(-5deg); }
    75% { transform: translateX(10px) rotate(5deg); }
  }
  .open { animation: openAnim 0.8s forwards; }
  @keyframes openAnim {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(2); opacity: 0; }
  }
</style>
</head>

<body>

<div class="container" id="box" onclick="handleClick()">
  <div class="gift">🎁</div>
  <div class="text" id="msg">มีของขวัญมาให้ ลองจิ้มดู 3 ทีนะ ☺️</div>
</div>

<div class="video-box" id="videoBox">
  <div class="text" style="margin-bottom: 15px;">ตั้งใจทำให้คนสวยนะครับ 💕</div>
  <video id="myVideo" controls playsinline>
    <source src="https://drive.google.com/uc?export=download&id=16anjszLH3r9CDeXfzLyNex55zYBQJynO" type="video/mp4">
    เบราว์เซอร์ของคุณไม่รองรับวิดีโอ
  </video>
</div>

<script>
let count = 0;
function handleClick() {
  const box = document.getElementById("box");
  const videoBox = document.getElementById("videoBox");
  const video = document.getElementById("myVideo");
  count++;

  if (count < 3) {
    box.classList.add("shake");
    setTimeout(() => box.classList.remove("shake"), 400);
  } else if (count === 3) {
    box.classList.add("open");
    setTimeout(() => {
      box.style.display = "none";
      videoBox.style.display = "block";
      // พยายามสั่งเล่นวิดีโอทันที
      video.play().catch(e => console.log("Auto-play blocked, user must press play"));
    }, 600);
  }
}
</script>

</body>
</html>
